<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">GNN Fraud Detection — Project Summary</text>

  <!-- Step 1 — Dataset -->
  <rect x="30" y="48" width="290" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="175" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">1. Dataset</text>
  <text x="175" y="90" text-anchor="middle" font-size="11" fill="#0f6e56">PaySim — 6.3M transactions, real fraud labels</text>

  <!-- Step 2 — Graph Construction -->
  <rect x="360" y="48" width="290" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="505" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">2. Graph Construction</text>
  <text x="505" y="90" text-anchor="middle" font-size="11" fill="#0f6e56">Nodes=accounts, Edges=transactions, Labels=fraud</text>

  <!-- Arrows row 1 -->
  <line x1="175" y1="104" x2="175" y2="138" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="505" y1="104" x2="505" y2="138" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3 — Feature Engineering -->
  <rect x="30" y="138" width="290" height="68" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="175" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">3. Feature Engineering</text>
  <text x="175" y="178" text-anchor="middle" font-size="11" fill="#0f6e56">12 real features: tx_count, avg_amount,</text>
  <text x="175" y="194" text-anchor="middle" font-size="11" fill="#0f6e56">std_amount, unique_dest, time_span…</text>

  <!-- Step 4 — GNN Model -->
  <rect x="360" y="138" width="290" height="68" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="505" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">4. GNN Model</text>
  <text x="505" y="178" text-anchor="middle" font-size="11" fill="#0f6e56">GraphSAGE + MLP edge classifier</text>
  <text x="505" y="194" text-anchor="middle" font-size="11" fill="#0f6e56">Weighted BCE loss, threshold tuning</text>

  <!-- Horizontal arrow between step 3 and 4 -->
  <line x1="320" y1="172" x2="360" y2="172" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrows row 2 -->
  <line x1="175" y1="206" x2="175" y2="240" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="505" y1="206" x2="505" y2="240" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 5 — Baselines -->
  <rect x="30" y="240" width="290" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="175" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">5. Baselines</text>
  <text x="175" y="280" text-anchor="middle" font-size="11" fill="#0f6e56">Logistic Regression, Random Forest, XGBoost</text>

  <!-- Arrows to results -->
  <line x1="175" y1="296" x2="175" y2="330" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="505" y1="296" x2="505" y2="330" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Baseline Results -->
  <rect x="30" y="330" width="290" height="82" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.8"/>
  <text x="175" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a">Baseline Results</text>
  <text x="175" y="372" text-anchor="middle" font-size="11" fill="#5f5e5a">Logistic Regression     F1 = 0.43</text>
  <text x="175" y="388" text-anchor="middle" font-size="11" fill="#5f5e5a">XGBoost                 F1 = 0.38</text>
  <text x="175" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#3b6d11">Random Forest           F1 = 0.68  ◄ best</text>

  <!-- GNN Results -->
  <rect x="360" y="330" width="290" height="82" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="505" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c">GNN Results</text>
  <text x="505" y="372" text-anchor="middle" font-size="11" fill="#534ab7">Basic GCN              F1 = 0.003  (start)</text>
  <text x="505" y="388" text-anchor="middle" font-size="11" fill="#534ab7">GCN fixed              F1 = 0.47</text>
  <text x="505" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#3c3489">GraphSAGE + MLP        F1 = 0.475  ◄ final</text>

  <!-- Arrows to conclusion -->
  <line x1="175" y1="412" x2="252" y2="453" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="505" y1="412" x2="428" y2="453" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Conclusion -->
  <rect x="100" y="453" width="480" height="110" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
  <text x="340" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Conclusion</text>
  <text x="340" y="498" text-anchor="middle" font-size="11" fill="#854f0b">GraphSAGE (F1=0.475) underperforms Random Forest (F1=0.677)</text>
  <text x="340" y="516" text-anchor="middle" font-size="11" fill="#854f0b">on identical features, showing that basic GNN architectures</text>
  <text x="340" y="534" text-anchor="middle" font-size="11" fill="#854f0b">don't automatically beat tree methods on tabular graphs.</text>
  <text x="340" y="552" text-anchor="middle" font-size="11" fill="#854f0b">Richer graph topology (multi-hop, edge features) is needed.</text>
</svg>
